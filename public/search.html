<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Room Rates | RoomRateCompare</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .results-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .hotel-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            display: flex;
            gap: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }
        
        .hotel-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        
        .hotel-image {
            width: 200px;
            height: 150px;
            background: linear-gradient(135deg, #e0e0e0, #f0f0f0);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 3rem;
        }
        
        .hotel-details {
            flex: 1;
        }
        
        .hotel-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .stars {
            color: #f39c12;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        
        .price-section {
            margin: 0.75rem 0;
        }
        
        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e67e22;
        }
        
        .original-price {
            text-decoration: line-through;
            color: #999;
            font-size: 1rem;
            margin-left: 0.5rem;
        }
        
        .savings {
            color: #27ae60;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            font-weight: 500;
        }
        
        .ota-links {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }
        
        .ota-link {
            background: #f0f0f0;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            text-decoration: none;
            color: #e67e22;
            font-weight: 500;
        }
        
        .ota-link:hover {
            background: #e67e22;
            color: white;
        }
        
        .view-details-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: inline-block;
            text-decoration: none;
        }
        
        .view-details-btn:hover {
            background: #d35400;
        }
        
        .loader {
            text-align: center;
            padding: 3rem;
        }
        
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: #e67e22;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 16px;
        }
        
        @media (max-width: 768px) {
            .hotel-card {
                flex-direction: column;
            }
            .hotel-image {
                width: 100%;
                height: 120px;
            }
            .ota-links {
                justify-content: center;
            }
            .view-details-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Room<span>Rate</span>Compare</h1>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/search">Search</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="results-container">
            <div id="results"></div>
            <div class="search-again">
                <a href="/">← Search again</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 RoomRateCompare.com - Compare hotel room rates instantly from 50+ sites</p>
    </footer>

    <script>
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function generateOTAlinks(hotelName, cityName, checkin, checkout, guests) {
            const searchQuery = encodeURIComponent(hotelName || cityName);
            const checkinParam = checkin || '2026-06-01';
            const checkoutParam = checkout || '2026-06-04';
            const guestsParam = guests || 2;
            
            return {
                booking: `https://www.booking.com/searchresults.html?ss=${searchQuery}&checkin=${checkinParam}&checkout=${checkoutParam}&group_adults=${guestsParam}`,
                agoda: `https://www.agoda.com/search?city=${searchQuery}&checkIn=${checkinParam}&checkOut=${checkoutParam}&adults=${guestsParam}`,
                expedia: `https://www.expedia.com/search?q=${searchQuery}&startDate=${checkinParam}&endDate=${checkoutParam}&adults=${guestsParam}`,
                hotelscom: `https://www.hotels.com/search?q=${searchQuery}&checkIn=${checkinParam}&checkOut=${checkoutParam}&adults=${guestsParam}`
            };
        }
        
        async function trackClick(hotelId, site) {
            try {
                await fetch('/api/hotels/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hotel_id: hotelId, site: site })
                });
                console.log(`✅ Tracked click for ${site}`);
            } catch(e) { 
                console.log('Track error:', e); 
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        let city = urlParams.get('city');
        const checkin = urlParams.get('checkin');
        const checkout = urlParams.get('checkout');
        const guests = urlParams.get('guests');
        
        if (!city) {
            const savedSearch = sessionStorage.getItem('roomratecompare_search');
            if (savedSearch) {
                const search = JSON.parse(savedSearch);
                city = search.city;
            }
        }
        
        async function searchHotels() {
            const resultsDiv = document.getElementById('results');
            
            if (!city || !checkin || !checkout) {
                resultsDiv.innerHTML = `<div class="no-results"><h3>🔍 Missing search information</h3><a href="/">← Search for hotels</a></div>`;
                return;
            }
            
            resultsDiv.innerHTML = `<div class="loader"><div class="loader-spinner"></div><p>🔍 Searching Booking.com, Agoda, Expedia...</p></div>`;
            
            try {
                const response = await fetch(`/api/hotels/search?city=${encodeURIComponent(city)}&checkin=${checkin}&checkout=${checkout}&guests=${guests || 2}`);
                const data = await response.json();
                
                if (data.hotels && data.hotels.length > 0) {
                    const nights = Math.ceil((new Date(checkout) - new Date(checkin)) / (1000 * 60 * 60 * 24));
                    
                    resultsDiv.innerHTML = `
                        <div class="results-header">
                            <h2>🏨 ${city.charAt(0).toUpperCase() + city.slice(1)} Hotel Room Rates</h2>
                            <p>${formatDate(checkin)} → ${formatDate(checkout)} • ${nights} night${nights > 1 ? 's' : ''} • ${guests || 2} guests • Found ${data.hotels.length} hotels</p>
                        </div>
                        ${data.hotels.map(hotel => {
                            const totalPrice = hotel.price;
                            const originalPrice = Math.round(totalPrice * 1.2);
                            const savings = originalPrice - totalPrice;
                            const otaLinks = generateOTAlinks(hotel.name, city, checkin, checkout, guests);
                            
                            return `
                            <div class="hotel-card">
                                <div class="hotel-image">🏨</div>
                                <div class="hotel-details">
                                    <div class="hotel-name">${escapeHtml(hotel.name)}</div>
                                    <div class="stars">${'★'.repeat(hotel.stars)}${'☆'.repeat(5-hotel.stars)}</div>
                                    <div class="price-section">
                                        <span class="price">$${totalPrice}</span>
                                        <span class="original-price">$${originalPrice}</span>
                                        <div class="savings">✨ Save $${savings}</div>
                                    </div>
                                    <div class="ota-links">
                                        <a href="${otaLinks.booking}" target="_blank" class="ota-link" onclick="trackClick(${hotel.id}, 'Booking.com')">Booking.com</a>
                                        <a href="${otaLinks.agoda}" target="_blank" class="ota-link" onclick="trackClick(${hotel.id}, 'Agoda')">Agoda</a>
                                        <a href="${otaLinks.expedia}" target="_blank" class="ota-link" onclick="trackClick(${hotel.id}, 'Expedia')">Expedia</a>
                                        <a href="${otaLinks.hotelscom}" target="_blank" class="ota-link" onclick="trackClick(${hotel.id}, 'Hotels.com')">Hotels.com</a>
                                    </div>
                                    <div>
                                        <a href="/hotel.html?id=${hotel.id}&checkin=${checkin}&checkout=${checkout}&guests=${guests || 2}&city=${encodeURIComponent(city)}">
                                            <button class="view-details-btn">View Details →</button>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `}).join('')}
                    `;
                } else {
                    resultsDiv.innerHTML = `<div class="no-results"><h3>🏨 No hotels found in ${city}</h3><a href="/">← Search again</a></div>`;
                }
            } catch (error) {
                console.error('Search error:', error);
                resultsDiv.innerHTML = `<div class="no-results"><h3>⚠️ Unable to fetch room rates</h3><a href="/">← Try again</a></div>`;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        if (city && checkin && checkout) {
            searchHotels();
        } else {
            document.getElementById('results').innerHTML = `<div class="no-results"><h3>🔍 No search criteria found</h3><a href="/">← Search for hotels</a></div>`;
        }
    </script>
</body>
</html>
