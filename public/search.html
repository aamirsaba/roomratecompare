<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Room Rates | RoomRateCompare</title>
    <link rel="stylesheet" href="/css/style.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GKJZTX45SB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-GKJZTX45SB');
    </script>
    
    <style>
        .results-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .results-header { margin-bottom: 2rem; }
        .results-header h2 { font-size: 1.5rem; color: #1a1a1a; }
        .results-header p { color: #666; margin-top: 0.5rem; }
        .hotel-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; display: flex; gap: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #eee; }
        .hotel-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .hotel-image { width: 200px; height: 150px; background: linear-gradient(135deg, #e0e0e0, #f0f0f0); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .hotel-details { flex: 1; }
        .hotel-name { font-size: 1.3rem; font-weight: 700; color: #1a1a1a; }
        .stars { color: #f39c12; margin: 0.5rem 0; font-size: 0.9rem; }
        .price { font-size: 1.8rem; font-weight: 700; color: #e67e22; }
        .original-price { text-decoration: line-through; color: #999; font-size: 0.9rem; margin-left: 0.5rem; }
        .savings { color: #27ae60; font-size: 0.8rem; margin-top: 0.25rem; }
        .booking-details { color: #666; font-size: 0.85rem; margin: 0.5rem 0; }
        .ota-links { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
        .ota-link { background: #f0f0f0; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.7rem; text-decoration: none; color: #e67e22; font-weight: 500; }
        .ota-link:hover { background: #e67e22; color: white; }
        .view-details-btn { background: #e67e22; color: white; border: none; padding: 0.8rem 2rem; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 1rem; text-decoration: none; display: inline-block; }
        .view-details-btn:hover { background: #d35400; }
        .loader { text-align: center; padding: 4rem; }
        .loader-spinner { width: 50px; height: 50px; border: 4px solid #f0f0f0; border-top-color: #e67e22; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-results { text-align: center; padding: 4rem; background: white; border-radius: 16px; }
        .search-again { margin-top: 2rem; text-align: center; }
        @media (max-width: 768px) { .hotel-card { flex-direction: column; } .hotel-image { width: 100%; height: 120px; } .view-details-btn { width: 100%; text-align: center; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><h1>Room<span>Rate</span>Compare</h1></div>
            <div class="nav-links"><a href="/">Home</a><a href="/search">Search</a></div>
        </nav>
    </header>

    <main>
        <div class="results-container">
            <div id="results"></div>
            <div class="search-again"><a href="/">← Search again</a></div>
        </div>
    </main>

    <footer><p>&copy; 2026 RoomRateCompare.com - Compare hotel room rates instantly</p></footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let city = urlParams.get('city');
        const checkin = urlParams.get('checkin');
        const checkout = urlParams.get('checkout');
        const guests = urlParams.get('guests') || 2;
        
        function formatDate(d) { if (!d) return ''; const date = new Date(d); return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
        
        async function searchHotels() {
            const resultsDiv = document.getElementById('results');
            if (!city || !checkin || !checkout) {
                resultsDiv.innerHTML = '<div class="no-results">Missing search information. <a href="/">Go back</a></div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="loader"><div class="loader-spinner"></div><p>Searching hotels...</p></div>';
            
            try {
                const response = await fetch(`/api/hotels/search?city=${encodeURIComponent(city)}&checkin=${checkin}&checkout=${checkout}&guests=${guests}`);
                const data = await response.json();
                console.log('API Response:', data);
                
                if (data.hotels && data.hotels.length > 0) {
                    const nights = Math.ceil((new Date(checkout) - new Date(checkin)) / (1000 * 60 * 60 * 24));
                    let html = `<div class="results-header"><h2>🏨 ${city.charAt(0).toUpperCase() + city.slice(1)} Hotels</h2><p>${formatDate(checkin)} → ${formatDate(checkout)} • ${nights} nights • ${guests} guests • ${data.hotels.length} hotels found</p></div>`;
                    
                    for (const hotel of data.hotels) {
                        const price = hotel.price;
                        const original = Math.round(price * 1.2);
                        const save = original - price;
                        const symbol = hotel.currencySymbol || '$';
                        const bookingLink = `https://www.booking.com/searchresults.html?ss=${encodeURIComponent(hotel.name)}&checkin=${checkin}&checkout=${checkout}&group_adults=${guests}`;
                        
                        html += `
                            <div class="hotel-card">
                                <div class="hotel-image">🏨</div>
                                <div class="hotel-details">
                                    <div class="hotel-name">${escapeHtml(hotel.name)}</div>
                                    <div class="stars">${'★'.repeat(hotel.stars || 4)}${'☆'.repeat(5-(hotel.stars || 4))}</div>
                                    <div><span class="price">${symbol}${price}</span> <span class="original-price">${symbol}${original}</span> <span class="savings">✨ Save ${symbol}${save}</span></div>
                                    <div class="booking-details">📅 ${formatDate(checkin)} - ${formatDate(checkout)} • ${nights} nights • ${guests} guests</div>
                                    <div class="ota-links">
                                        <a href="${bookingLink}" target="_blank" class="ota-link">🏨 Booking.com</a>
                                        <a href="https://www.agoda.com/search?city=${encodeURIComponent(city)}&checkIn=${checkin}&checkOut=${checkout}&adults=${guests}" target="_blank" class="ota-link">🌏 Agoda</a>
                                        <a href="https://www.expedia.com/search?q=${encodeURIComponent(city)}+hotels&startDate=${checkin}&endDate=${checkout}&adults=${guests}" target="_blank" class="ota-link">✈️ Expedia</a>
                                    </div>
                                </div>
                                <div><a href="/hotel.html?id=${hotel.id}&checkin=${checkin}&checkout=${checkout}&guests=${guests}&city=${encodeURIComponent(city)}&name=${encodeURIComponent(hotel.name)}"><button class="view-details-btn">View Details →</button></a></div>
                            </div>
                        `;
                    }
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = `<div class="no-results">🏨 No hotels found in ${city}. <a href="/">Try another city</a></div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = '<div class="no-results">⚠️ Unable to fetch hotels. Please try again.</div>';
            }
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        if (city && checkin && checkout) { searchHotels(); } 
        else { document.getElementById('results').innerHTML = '<div class="no-results">No search criteria found. <a href="/">Search for hotels</a></div>'; }
    </script>
</body>
</html>
